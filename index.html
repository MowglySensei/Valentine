<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Valentine💖</title>

  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #ffd6e7, #ffc2d1);
      font-family: Arial, sans-serif;
      text-align: center;
    }

    .container {
      background: white;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      max-width: 90vw;
    }

    h1 {
      color: #e91e63;
      font-size: clamp(1.1rem, 4vw, 1.5rem);
    }

    img {
      width: min(150px, 45vw);
      height: auto;
      margin: 20px 0;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      gap: 10px;
    }

    button {
      border: none;
      padding: 15px 25px;
      border-radius: 10px;
      font-size: 18px;
      cursor: pointer;
      transition: 0.2s;
    }

    #yes {
      background: #4CAF50;
      color: white;
    }

    #no {
      background: #f44336;
      color: white;
    }
  </style>
</head>
<body>

<div class="container">
  <h1><h1>
  Veux-tu être ma Valentine<br>
  pour ce soir 05/04/2026 ? 💖
</h1></h1>

  <img id="cat" src="https://media1.giphy.com/media/v1.Y2lkPTc5MGI3NjExam5kYzM0MHdvNDZveWt0cTk1Znc1dHNneGlycWNjcWR6dGJpMWpyNSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/xPjQFNSr27et6Eb5yq/giphy.gif" alt="Chat">

  <div class="actions">
    <button type="button" id="yes">Yes</button>
    <button type="button" id="no">No</button>
  </div>
</div>

<script>
  let yesBtn = document.getElementById("yes");
  let noBtn = document.getElementById("no");
  let cat = document.getElementById("cat");

  let size = 18;

  const texts = [
    "Non",
    "T'es sûr ? 😢",
    "Vraiment sûr ? 🥺",
    "Réfléchis bien 😭",
    "Dernière chance 💔"
  ];

  /* 1er = ta proposition, puis 4 chats tristes Giphy */
  const gifs = [
    "https://media1.giphy.com/media/v1.Y2lkPTc5MGI3NjExam5kYzM0MHdvNDZveWt0cTk1Znc1dHNneGlycWNjcWR6dGJpMWpyNSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/xPjQFNSr27et6Eb5yq/giphy.gif",
    "https://media.giphy.com/media/4PEFw6j61P2o5ZtUqZ/giphy.gif",
    "https://media.giphy.com/media/qpCvOBBmBkble/giphy.gif",
    "https://media.giphy.com/media/13CoXDiaCcCoyk/giphy.gif",
    "https://media2.giphy.com/media/v1.Y2lkPTc5MGI3NjExNTE2bDlkNmpxazR0MDF2eXlrZXRvcnFkOTZ6NzN0bXJmOXphM2dzMiZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/i0lZAPw40F212/giphy.gif"
  ];

  let index = 0;
  let locked = false;

  function teleportNoAway() {
    noBtn.style.position = "fixed";
    noBtn.style.top = Math.random() * (window.innerHeight - 60) + "px";
    noBtn.style.left = Math.random() * (window.innerWidth - 100) + "px";
  }

  function resetNoInCard() {
    noBtn.style.position = "";
    noBtn.style.top = "";
    noBtn.style.left = "";
  }

  noBtn.addEventListener("click", () => {

    size += 10;
    yesBtn.style.fontSize = size + "px";
    yesBtn.style.padding = (size / 2) + "px";

    if (!locked) {
      if (index < texts.length) {
        noBtn.innerText = texts[index];
      }

      if (index < gifs.length) {
        cat.src = gifs[index];
      }

      index++;

      if (index === texts.length) {
        locked = true;
      }

      /* Dernière chance : pas de saut aléatoire vers le Yes — le bouton reste sous la carte */
      if (index >= texts.length) {
        resetNoInCard();
      } else {
        teleportNoAway();
      }
    }
  });

  yesBtn.addEventListener("click", () => {
    document.body.innerHTML = `
<div style="
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  align-items:center;
  height:100vh;
  text-align:center;
  padding:20px;
  box-sizing:border-box;
">

  <h1 style="color:#e91e63; margin-top:10px;">
    YEEEEEEEEEESS 💖
  </h1>

  <img 
    src="https://media4.giphy.com/media/v1.Y2lkPTc5MGI3NjExNWlic2syb2djbjByMjVndHhjZTc4d3ZnYXp0ZXEwNHNqZW4yZDc4ZCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/PPgZCwZPKrLcw75EG1/giphy.gif" 
    style="width: min(350px, 80vw); height:auto;"
  >

  <p style="color:#333; font-size:18px; margin-bottom:20px;">
    Je savais que tu dirais oui 😏 À ce soir je viens te chercher!😉🤭
  </p>

</div>
`;
    let duration = 3000;
    let end = Date.now() + duration;

    (function frame() {
      confetti({
        particleCount: 5,
        angle: 60,
        spread: 55,
        origin: { x: 0 }
      });
      confetti({
        particleCount: 5,
        angle: 120,
        spread: 55,
        origin: { x: 1 }
      });

      if (Date.now() < end) {
        requestAnimationFrame(frame);
      }
    })();
  });
</script>

</body>
</html>
